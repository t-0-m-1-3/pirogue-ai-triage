# /etc/nginx/sites-available/your-demo-domain.com
#
# Demo site for PiRogue conference talk.
# Serves a landing page + fake C2 endpoints that trigger Suricata rules.
#
# IMPORTANT: Replace YOUR_VPS_IP with your actual VPS public IP.
# PiRogue's default nginx site binds to the specific VPS IP, so this
# config must also bind to the same IP for server_name routing to work.
# The WireGuard IP (10.8.0.1) is needed for demo triggers fired through the tunnel.
#
# Install:
#   sudo cp your-demo-domain.com.conf /etc/nginx/sites-available/your-demo-domain.com
#   sudo ln -sf /etc/nginx/sites-available/your-demo-domain.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl restart nginx

# HTTP — needed for the HTTP beacon demo (rule 9999904)
# Suricata can't inspect User-Agent over HTTPS without MITM
server {
    listen YOUR_VPS_IP:80;
    listen 10.8.0.1:80;
    server_name your-demo-domain.com www.your-demo-domain.com;

    root /var/www/your-demo-domain.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fake C2 gate endpoint (triggers rule 9999904 — HTTP beacon UA)
    location /gate.php {
        default_type application/json;
        return 200 '{"status":"ok","id":"demo","ts":"$time_iso8601"}';
    }

    # Fake beacon endpoint
    location /beacon {
        default_type application/json;
        return 200 '{"beacon":"ack","interval":60}';
    }

    # Fake exfil endpoint
    location /upload {
        default_type text/plain;
        return 200 'received';
    }

    # Health check
    location /health {
        default_type text/plain;
        return 200 'ok';
    }

    access_log /var/log/nginx/demo-site-access.log combined;
    error_log /var/log/nginx/demo-site-error.log warn;
}

# HTTPS — for the DNS trigger (rule 9999901) and JA3 demo (rule 9999903)
# Cloudflare handles TLS termination in Full (strict) mode,
# so this block uses the Cloudflare origin certificate.
server {
    listen YOUR_VPS_IP:443 ssl;
    listen 10.8.0.1:443 ssl;
    server_name your-demo-domain.com www.your-demo-domain.com;

    # Cloudflare origin certificate (see CLOUDFLARE_SETUP.md)
    ssl_certificate     /etc/ssl/cloudflare/your-demo-domain.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/your-demo-domain.com.key;

    # TLS 1.2 only for origin — Cloudflare handles TLS 1.3 on the edge.
    # Some OpenSSL versions have key share issues with TLS 1.3 from CF edge.
    ssl_protocols TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/your-demo-domain.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /gate.php {
        default_type application/json;
        return 200 '{"status":"ok","id":"demo","ts":"$time_iso8601"}';
    }

    location /beacon {
        default_type application/json;
        return 200 '{"beacon":"ack","interval":60}';
    }

    location /upload {
        default_type text/plain;
        return 200 'received';
    }

    location /health {
        default_type text/plain;
        return 200 'ok';
    }

    access_log /var/log/nginx/demo-site-ssl-access.log combined;
    error_log /var/log/nginx/demo-site-ssl-error.log warn;
}
